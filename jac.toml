[project]
name = "."
entry-point = "main.jac"
kind = "web-app"

[jac-shadcn]
style = "nova"
baseColor = "neutral"
theme = "neutral"
font = "figtree"
radius = "default"
menuAccent = "subtle"
menuColor = "default"

[dependencies]
requests = ">=2.31.0"
redis = ">=5.0.0"

[dependencies.npm]
input-otp = "*"
embla-carousel-react = "*"
react-resizable-panels = "*"
"@radix-ui/react-slot" = "*"
cmdk = "*"
recharts = "*"
react-day-picker = "*"
sonner = "*"
vaul = "*"
"@base-ui/react" = "*"
"@hugeicons/react" = "*"
"@hugeicons/core-free-icons" = "*"
radix-ui = "*"
class-variance-authority = "*"
"@fontsource-variable/figtree" = "*"
shadcn = "^3.8.5"
"@tailwindcss/vite" = "^4.1.17"
tailwindcss = "^4.1.17"
clsx = "^2.1.1"
tailwind-merge = "^3.5.0"
tw-animate-css = "^1.4.0"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
"@tanstack/react-form" = "^1.33.0"
zod = "^4.3.6"
react-hook-form = "^7.71.0"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

# Run as a single in-process gateway (metrics_sv is imported in-process by main.jac).
# Without this the scale layer auto-detects metrics_sv + billing_sv as separate
# microservices and spawns them as subprocesses -> byllm/import crash.
# (Config flattened in jaclang: [plugins.scale.microservices] -> [scale.microservices].)
[scale.microservices]
enabled = false
